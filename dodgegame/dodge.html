<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie Escape</title>
    <link rel="stylesheet" href="dodge.css">
</head>
<body>

<div id="menu" class="overlay">
    <h1>🧟 Zombie Escape</h1>
    <p>Survive endless waves of zombies.</p>

    <div class="controls">
        <p><b>Move:</b> WASD / Arrow Keys</p>
        <p><b>Sprint:</b> Shift</p>
        <p><b>Shoot:</b> Left Mouse Button</p>
        <p><b>Pause:</b> P</p>
    </div>

    <button id="startBtn">Start Game</button>
</div>

<div id="hud">

    <div class="card">
        ❤️
        <span id="health">5</span>
    </div>

    <div class="card">
        🏆
        <span id="score">0</span>
    </div>

    <div class="card">
        🌊
        <span id="wave">1</span>
    </div>

    <div class="card">
        💰
        <span id="coins">0</span>
    </div>

    <div class="card">
        ⚡
        <span id="stamina">100</span>
    </div>

</div>

<div id="waveText"></div>

<div id="game">

    <div id="player"></div>

</div>

<div id="crosshair"></div>

<div id="pause" class="overlay hidden">
    <h1>⏸ Paused</h1>
    <p>Press P to Continue</p>
</div>

<div id="gameOver" class="overlay hidden">

    <h1>💀 Game Over</h1>

    <h2>Final Score</h2>

    <h3 id="finalScore">0</h3>

    <button id="restartBtn">
        Play Again
    </button>

</div>

<script src="dodge.js"></script>

</body>
</html>
