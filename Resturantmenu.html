<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu</title>
    <link rel="stylesheet" href="Resturantmenu.css">
</head>

<body>

<h1>🍽 Restaurant Menu</h1>

<div class="menu">
    <h2>Menu</h2>

    <div class="item">
        <span>Burger - $8.99</span>
        <button onclick="addItem('Burger', 8.99)">Add</button>
    </div>

    <div class="item">
        <span>Pizza - $12.50</span>
        <button onclick="addItem('Pizza', 12.50)">Add</button>
    </div>

    <div class="item">
        <span>Pasta - $10.75</span>
        <button onclick="addItem('Pasta', 10.75)">Add</button>
    </div>

    <div class="item">
        <span>Salad - $6.50</span>
        <button onclick="addItem('Salad', 6.50)">Add</button>
    </div>

    <div class="item">
        <span>Soda - $2.00</span>
        <button onclick="addItem('Soda', 2.00)">Add</button>
    </div>
</div>

<div class="order">
    <h2>Your Order</h2>

    <ul id="orderList"></ul>

    <div class="total">
        Total: $<span id="total">0.00</span>
    </div>

    <button class="danger" onclick="clearOrder()">Clear Order</button>
    <button class="checkout" onclick="checkout()">Checkout</button>
</div>

<script>
let orderItems = {};

function addItem(name, price) {
    if (!orderItems[name]) {
        orderItems[name] = { price: price, quantity: 1 };
    } else {
        orderItems[name].quantity++;
    }
    renderOrder();
}

function increaseItem(name) {
    orderItems[name].quantity++;
    renderOrder();
}

function decreaseItem(name) {
    orderItems[name].quantity--;

    if (orderItems[name].quantity <= 0) {
        delete orderItems[name];
    }
    renderOrder();
}

function clearOrder() {
    orderItems = {};
    renderOrder();
}

function checkout() {
    if (Object.keys(orderItems).length === 0) {
        alert("Your order is empty!");
        return;
    }

    let receipt = "🧾 Receipt\n\n";
    let total = 0;

    for (let name in orderItems) {
        let item = orderItems[name];
        let itemTotal = item.price * item.quantity;

        receipt += `${name} x${item.quantity} - $${itemTotal.toFixed(2)}\n`;
        total += itemTotal;
    }

    let date = new Date();

    receipt += "\n----------------------\n";
    receipt += `Total: $${total.toFixed(2)}\n`;
    receipt += `Date: ${date.toLocaleString()}\n`;
    receipt += "Thank you! 🍽";

    alert(receipt);

    clearOrder();
}

function renderOrder() {
    const list = document.getElementById("orderList");
    list.innerHTML = "";

    let total = 0;

    for (let name in orderItems) {
        const item = orderItems[name];

        const li = document.createElement("li");
        li.innerHTML = `
            ${name} x${item.quantity} - $${(item.price * item.quantity).toFixed(2)}
            <span class="controls">
                <button onclick="increaseItem('${name}')">+</button>
                <button onclick="decreaseItem('${name}')">-</button>
            </span>
        `;

        list.appendChild(li);
        total += item.price * item.quantity;
    }

    document.getElementById("total").textContent = total.toFixed(2);
}
</script>

</body>
</html>
